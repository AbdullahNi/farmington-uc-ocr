kind = "api"
previewPath = "/"
title = "Flask ID Extractor Server"
version = "1.0.0"

[[services]]
localPort = 8080
name = "Flask ID Extractor Server"
paths = ["/"]

[services.development]
run = "python3 artifacts/flask-server/app.py"

[services.production]

[services.production.run]
args = ["gunicorn", "--workers", "2", "--bind", "0.0.0.0:8080", "--timeout", "120", "--chdir", "artifacts/flask-server", "app:app"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/health"
